<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>PixelForge · 像素动画编辑器</title>
  <link rel="stylesheet" href="css/style.css?v=10">
</head>
<body class="editor">

  <!-- 顶部栏 -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon" id="brandIcon"></div>
      <span class="brand-text">PixelForge</span>
    </div>
    <a href="gallery.html" class="nav-link">作品画廊</a>
    <div class="spacer"></div>
    <div class="user-menu" id="userMenu">
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userName">用户</span>
      <span class="user-logout" id="btnLogout">退出</span>
    </div>
  </header>

  <main class="workspace">

    <!-- 左侧面板 -->
    <aside class="sidebar-left">
      

      <div class="panel-section">
        <h3>调色板</h3>
        <div id="palette" class="palette"></div>
        <div class="color-picker-wrap">
          <button class="action-btn primary cw-open-btn" id="btnColorWheel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:5px"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20" fill="currentColor" opacity="0.3"/><circle cx="12" cy="12" r="4"/></svg>
            色轮选色
          </button>
          <input type="color" id="colorPicker" value="#000000" style="display:none">
        </div>
        <div class="palette-actions">
          <button class="action-btn sm" id="btnDeleteColor" title="删除当前选中的自定义颜色">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px;margin-right:4px"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            删除选中色
          </button>
          <button class="action-btn sm" id="btnResetPalette" title="恢复默认调色板">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:4px"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            恢复默认
          </button>
        </div>
      </div>

      <!-- 临时调色板 -->
      <div class="panel-section" style="border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px;">
        <h3>临时调色板 <span style="font-weight:400;font-size:10px;color:var(--text-dim);text-transform:none">(右键移除)</span></h3>
        <div id="tempPalette" class="temp-palette">
          <span class="temp-empty">🎨 点击吸管取色</span>
        </div>
      </div>

      <!-- 钢笔大小控制 -->
      <div id="penSizeControl" class="panel-section" style="border-bottom: none; padding-bottom: 0; margin-bottom: 8px;">
        <h3>钢笔大小</h3>
        <div class="size-row">
          <input type="range" id="penSizeSlider" min="1" max="10" value="1" style="flex:1;accent-color:var(--primary)">
          <span id="penSizeLabel" style="font-size:12px;color:var(--text-muted);min-width:32px">1px</span>
        </div>
      </div>

      <!-- 橡皮擦大小控制 -->
      <div id="eraserSizeControl" class="panel-section" style="display:none; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
        <h3>橡皮擦大小</h3>
        <div class="size-row">
          <input type="range" id="eraserSizeSlider" min="1" max="20" value="3" style="flex:1;accent-color:var(--primary)">
          <span id="eraserSizeLabel" style="font-size:12px;color:var(--text-muted);min-width:32px">3px</span>
        </div>
      </div>

      <!-- 图层区域（新增） -->
      <div class="panel-section layer-section" id="layerPanel" style="display:none;">
        <h3>
          图层
          <span style="font-weight:400;font-size:10px;color:var(--text-dim);text-transform:none">(当前帧)</span>
        </h3>
        <div class="layer-list" id="layerList">
          <div class="layer-empty">暂无图层，点击 "新建" 创建</div>
        </div>
        <div class="layer-opacity-row">
          <label>不透明度</label>
          <input type="range" id="layerOpacitySlider" min="0" max="100" value="100" style="flex:1;accent-color:var(--primary)">
          <span id="layerOpacityLabel" style="font-size:11px;color:var(--text-muted);min-width:36px;text-align:right">100%</span>
        </div>
        <div class="layer-actions">
          <button class="action-btn sm" id="btnAddLayer" title="新建图层">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新建
          </button>
          <button class="action-btn sm" id="btnDupLayer" title="复制图层">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
          <button class="action-btn sm danger" id="btnDelLayer" title="删除图层">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            删除
          </button>
        </div>
        <div class="layer-actions" style="margin-top:4px;">
          <button class="action-btn sm" id="btnLayerUp" title="上移图层">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            上移
          </button>
          <button class="action-btn sm" id="btnLayerDown" title="下移图层">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            下移
          </button>
          <button class="action-btn sm" id="btnMergeLayer" title="向下合并">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M4 12l8 8 8-8"/></svg>
            合并
          </button>
        </div>
      </div>
      
    </aside>

    
    <div class="outer-div">
      <!-- 垂直工具栏 -->
      <nav class="toolbar-vertical">
        <button class="tool-btn active" data-tool="pencil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          <span class="tooltip">铅笔 (P)</span>
        </button>
        <button class="tool-btn" data-tool="eraser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16c-1-1-1-2 0-3l9-9c1-1 2-1 3 0l6 6c1 1 1 2 0 3l-6 7"/><path d="M22 20H7"/></svg>
          <span class="tooltip">橡皮 (E)</span>
        </button>
        <button class="tool-btn" data-tool="fill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11h-1l-7-7-7 7v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1"/><path d="M5 11l7-7 7 7"/><path d="M2 22h20"/></svg>
          <span class="tooltip">填充 (F)</span>
        </button>
        <button class="tool-btn" data-tool="eyedropper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 22l8-8"/>
            <path d="M10 10l4 4"/>
            <path d="M21 3l-4 4-4-4 4-4z"/>
            <path d="M13 7l4 4"/>
            <path d="M17 11l-4 4-4-4 4-4z"/>
          </svg>
          <span class="tooltip">吸管 (I)</span>
        </button>
        <button class="tool-btn" data-tool="line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><circle cx="5" cy="19" r="1.5" fill="currentColor"/><circle cx="19" cy="5" r="1.5" fill="currentColor"/></svg>
          <span class="tooltip">直线 (L)</span>
        </button>
        <button class="tool-btn" data-tool="circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg>
          <span class="tooltip">圆形 (C)</span>
        </button>
        <button class="tool-btn" data-tool="rect">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
          <span class="tooltip">矩形 (R)</span>
        </button>
        <button class="tool-btn" data-tool="ellipse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="9" ry="6"/></svg>
          <span class="tooltip">椭圆 (O)</span>
        </button>
        <button class="tool-btn" data-tool="pan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><path d="M2 12h20"/><path d="M12 2v20"/></svg>
          <span class="tooltip">平移 (空格)</span>
        </button>

        <button class="tool-btn" id="btnToggleLayers" data-show-layers="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3,9 12,4 21,9 21,13 12,18 3,13" />
            <polygon points="3,9 12,4 21,9" />
            <polyline points="3,13 3,9" />
            <polyline points="21,13 21,9" />
            <polygon points="5,13 12,9 19,13 19,17 12,21 5,17" />
            <polyline points="5,17 5,13" />
            <polyline points="19,17 19,13" />
          </svg>
          <span class="tooltip">图层</span>
        </button>

        <button class="tool-btn" data-tool="crop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
          <span class="tooltip">裁剪 (K)</span>
        </button>
        <button class="tool-btn" id="btnUndo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.7 2.9L3 13"/></svg>
          <span class="tooltip">撤销 (Ctrl+Z)</span>
        </button>
        <button class="tool-btn" id="btnRedo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.7 2.9L21 13"/></svg>
          <span class="tooltip">重做 (Ctrl+Y)</span>
        </button>
        <button class="tool-btn" id="btnClear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span class="tooltip">清空</span>
        </button>
        <button class="tool-btn active" id="btnGrid">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="tooltip">网格</span>
        </button>
        
        <button class="tool-btn" id="open-settingcard-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span class="tooltip">设置</span>
        </button>

        <button class="tool-btn" id="open-picturecard-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2" ry="2"/>
            <circle cx="8.5" cy="9.5" r="1.5"/>
            <polyline points="2 15 6 11 10 14 14 10 18 13 22 9 22 17 2 17"/>
            <polyline points="16 16 20 20 20 17"/>
            <polyline points="16 16 20 20 17 20"/>
            <line x1="12" y1="20" x2="20" y2="20"/>
          </svg>
          <span class="tooltip">导入图片</span>
        </button>
        
      </nav>

      <!-- 画布区 -->
      <section class="canvas-area">
        <div class="canvas-toolbar">
          <span class="canvas-info" id="canvasInfo">32 × 32 像素</span>
          <div class="zoom-control rot-control">
            <button class="zoom-btn" id="btnRotL" title="逆时针旋转 90°">⟲</button>
            <span id="rotLabel" class="canvas-info" style="min-width:34px;text-align:center">0°</span>
            <button class="zoom-btn" id="btnRotR" title="顺时针旋转 90°">⟳</button>
            <button class="zoom-btn" id="btnRotReset" title="重置旋转">⟰</button>
            <input type="range" id="rotSlider" min="0" max="359" value="0" style="width:84px;accent-color:var(--primary)" title="自由旋转角度">
          </div>
          <div class="zoom-control">
            <button class="zoom-btn" id="btnFlipH" title="水平翻转（像素）">↔</button>
            <button class="zoom-btn" id="btnFlipV" title="垂直翻转（像素）">↕</button>
            <button class="zoom-btn" id="btnRotCCW90" title="逆时针旋转 90°（像素）">⟲</button>
            <button class="zoom-btn" id="btnRotCW90" title="顺时针旋转 90°（像素）">⟳</button>
            <button class="zoom-btn" id="btnResetView" title="重置视图（平移/旋转）">↺</button>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text,#333);margin-left:4px;">
              <input type="checkbox" id="shapeFillCb"> 填充
            </label>
          </div>
          <div class="zoom-control">
            <button class="zoom-btn" id="btnZoomOut" title="缩小">−</button>
            <span id="zoomLevel">100%</span>
            <button class="zoom-btn" id="btnZoomIn" title="放大">+</button>
            <button class="zoom-btn" id="btnZoomFit" title="适应窗口">适应</button>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="drawCanvas"></canvas>
        </div>
        <div class="crop-bar" id="cropBar" style="display:none">
          <span class="crop-info">选区: <strong id="cropSize">0 × 0</strong></span>
          <button class="action-btn primary" id="btnCropConfirm">确认裁剪</button>
          <button class="action-btn" id="btnCropCancel">取消</button>
        </div>
      </section>
    </div>

    <!-- 右侧面板 -->
    <aside class="sidebar-right">
      <div class="panel-section">
        <h3>帧动画</h3>
        <div id="frameList" class="frame-list"></div>
        <div class="frame-actions">
          <button class="action-btn" id="btnAddFrame" title="新建帧">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-2px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新帧
          </button>
          <button class="action-btn" id="btnDupFrame" title="复制当前帧">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
          <button class="action-btn danger" id="btnDelFrame" title="删除当前帧">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>

      <div class="panel-section">
        <h3>播放预览</h3>
        <div class="playback">
          <button class="action-btn primary" id="btnPlay">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;margin-right:3px"><polygon points="5,3 19,12 5,21"/></svg>
            播放
          </button>
          <button class="action-btn" id="btnOnion">洋葱皮</button>
        </div>
        <div class="onion-control" id="onionControl" style="display:none; margin-top:8px;">
          <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text,#333);">
            <span style="color:#ff3b30;">●前</span>
            <span style="color:#0a84ff;">●后</span>
            <input type="range" id="onionAlphaSlider" min="5" max="80" value="30" style="flex:1; accent-color:var(--primary,#4a7fff);">
            <span id="onionAlphaLabel">30%</span>
          </label>
        </div>
        <div class="fps-control">
          <label>速度</label>
          <input type="range" id="fpsSlider" min="1" max="24" value="12">
          <span id="fpsLabel">12 FPS</span>
        </div>
      </div>
    </aside>
  </main>

  <!-- 底部栏 -->
  <footer class="bottombar">
    <div class="spacer"></div>
    <button class="action-btn primary" id="btnPng">导出 PNG</button>
    <div class="gif-export-group">
      <select id="gifScale" class="gif-scale-select" title="GIF导出缩放倍数">
        <option value="1">1x 原始</option>
        <option value="2">2x</option>
        <option value="4" selected>4x 推荐</option>
        <option value="8">8x 高清</option>
      </select>
      <button class="action-btn accent" id="btnGif">导出 GIF</button>
      <div class="gif-progress" id="gifProgress" style="display:none">
        <div class="gif-progress-bar"><div class="gif-progress-fill"></div></div>
        <span class="gif-progress-text">0%</span>
      </div>
    </div>
    <button class="action-btn" id="btnLoadLocal" title="从本地 .pixa 文件加载项目">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      加载本地
    </button>
    <button class="action-btn" id="btnSaveLocal" title="保存为 .pixa 项目文件到本地">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      保存本地
    </button>
    <button class="action-btn primary" id="btnSaveProject" title="保存项目到云端（自动保存，也可手动点击）">

  <script>




    (function() {
      var user = Auth.requireAuth();
      if (user) {
        Auth.makePixelLogo(document.getElementById('brandIcon'));
        Auth.renderUserMenu(user);
        var authorInput = document.getElementById('workAuthor');
        if (authorInput && !authorInput.value) {
          authorInput.value = user.username;
        }
      }
    })();
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      var map = { 'p':'pencil','e':'eraser','f':'fill','l':'line','c':'circle','k':'crop','i':'eyedropper' };
      var tool = map[e.key.toLowerCase()];
      if (tool) {
        var btn = document.querySelector('[data-tool="'+tool+'"]');
        if (btn) btn.click();
      }
      if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); document.getElementById('btnUndo').click(); }
      if ((e.ctrlKey||e.metaKey) && e.key==='y') { e.preventDefault(); document.getElementById('btnRedo').click(); }
    });

    (function() {
      var pictureOverlay = document.getElementById('pictureCardOverlay');
      var openBtn = document.getElementById('open-picturecard-btn');
      var closeBtn = document.getElementById('pictureCardClose');

      function openPictureCard() {
        pictureOverlay.classList.add('open');
        document.querySelector('.main-content')?.classList.add('blurred');
      }

      function closePictureCard() {
        pictureOverlay.classList.remove('open');
        document.querySelector('.main-content')?.classList.remove('blurred');
      }

      pictureOverlay.addEventListener('click', function(e) {
        if (e.target === pictureOverlay) closePictureCard();
      });

      openBtn.addEventListener('click', openPictureCard);
      closeBtn.addEventListener('click', closePictureCard);

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closePictureCard();
      });
    })();

    (function() {
      var settingOverlay = document.getElementById('settingCardOverlay');
      var openBtn = document.getElementById('open-settingcard-btn');
      var closeBtn = document.getElementById('settingCardClose');

      function openSettingCard() {
        settingOverlay.classList.add('open');
        document.querySelector('.main-content')?.classList.add('blurred');
      }

      function closeSettingCard() {
        settingOverlay.classList.remove('open');
        document.querySelector('.main-content')?.classList.remove('blurred');
      }

      settingOverlay.addEventListener('click', function(e) {
        if (e.target === settingOverlay) closeSettingCard();
      });

      openBtn.addEventListener('click', openSettingCard);
      closeBtn.addEventListener('click', closeSettingCard);

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSettingCard();
      });
    })();

    window.closeSettingCard = function() {
    var overlay = document.getElementById('settingCardOverlay');
    if (overlay) {
      overlay.classList.remove('open');
    }
    document.querySelector('.main-content')?.classList.remove('blurred');
  };

  window.closePictureCard = function() {
    var overlay = document.getElementById('pictureCardOverlay');
    if (overlay) {
      overlay.classList.remove('open');
    }
    document.querySelector('.main-content')?.classList.remove('blurred');
  };

  // 也可以用一个通用函数关闭所有卡片
  window.closeAllCards = function() {
    document.querySelectorAll('.card-overlay').forEach(function(el) {
      el.classList.remove('open');
    });
    document.querySelector('.main-content')?.classList.remove('blurred');
  };

  // ---- 音效按钮控制 ----
  (function() {
    var btn = document.getElementById('btnSoundToggle');
    var onIcon = document.getElementById('soundOnIcon');
    var offIcon = document.getElementById('soundOffIcon');

    function updateSoundUI() {
      if (!window.SFX) return;
      var isMuted = window.SFX.muted;
      if (onIcon) onIcon.style.display = isMuted ? 'none' : 'block';
      if (offIcon) offIcon.style.display = isMuted ? 'block' : 'none';
      if (btn) {
        btn.title = isMuted ? '开启音效' : '关闭音效';
        btn.style.borderColor = isMuted ? 'var(--danger)' : 'var(--primary)';
      }
    }

    if (btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!window.SFX) return;
        var wasMuted = window.SFX.muted;
        window.SFX.toggleMute();
        if (wasMuted && !window.SFX.muted) {
          setTimeout(function() {
            window.SFX.click();
            setTimeout(function() { window.SFX.confirm(); }, 150);
          }, 50);
        }
        updateSoundUI();
      });
    }

    setTimeout(updateSoundUI, 500);
  })();

  </script>
