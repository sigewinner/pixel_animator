<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素动画编辑器 · 登录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" id="logoIcon"></div>
      <h1>PixelForge</h1>
    </div>
    <p class="auth-subtitle">像素动画创作工坊 · 让创意动起来</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>

    <div class="auth-error" id="authError"></div>

    <form id="authForm" onsubmit="return handleSubmit(event)">
      <div class="auth-field">
        <label>用户名</label>
        <div class="auth-input-group">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" placeholder="输入用户名" autocomplete="username" required minlength="2" maxlength="20">
        </div>
      </div>

      <div class="auth-field" id="emailField" style="display:none">
        <label>邮箱 <span style="color:var(--text-dim);font-weight:400;text-transform:none">（选填）</span></label>
        <div class="auth-input-group">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>
      </div>

      <div class="auth-field">
        <label>密码</label>
        <div class="auth-input-group">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="输入密码" autocomplete="current-password" required minlength="4">
        </div>
      </div>

      <button type="submit" class="auth-btn" id="submitBtn">登录</button>
    </form>

    <p class="auth-footer">
      <a href="#" onclick="guestLogin();return false">游客模式体验 →</a>
    </p>
  </div>

  <!-- 隐藏的文件选择器 -->
  <input type="file" id="bgFileInput" accept="image/*" style="display:none" onchange="handleBgChange(event)">

  <!-- 右下角背景更换按钮 -->
  <div class="bg-changer">
    <button class="bg-reset-btn" id="bgResetBtn" onclick="resetBg()" title="恢复默认背景">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      恢复默认
    </button>
    <button class="bg-changer-btn" onclick="document.getElementById('bgFileInput').click()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      更换背景
    </button>
  </div>

  <script>
    // ---- 像素 Logo 生成 ----
    (function makeLogo() {
      const colors = [
        '#8b5cf6','#a78bfa','#38bdf8','#7dd3fc',
        '#8b5cf6','#e4e4f0','#38bdf8','#7dd3fc',
        '#a78bfa','#e4e4f0','#e4e4f0','#38bdf8',
        '#7dd3fc','#38bdf8','#8b5cf6','#a78bfa',
      ];
      const logo = document.getElementById('logoIcon');
      colors.forEach(c => {
        const px = document.createElement('span');
        px.style.background = c;
        logo.appendChild(px);
      });
    })();

    let mode = 'login';

    function switchTab(m) {
      mode = m;
      document.getElementById('tabLogin').classList.toggle('active', m === 'login');
      document.getElementById('tabRegister').classList.toggle('active', m === 'register');
      document.getElementById('emailField').style.display = m === 'register' ? 'block' : 'none';
      document.getElementById('submitBtn').textContent = m === 'login' ? '登录' : '注册';
      document.getElementById('authError').classList.remove('show');
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.classList.add('show');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = mode === 'login' ? '登录中...' : '注册中...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const email = document.getElementById('email').value.trim();

      try {
        const res = await fetch('/api/auth/' + mode, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, email })
        });
        const data = await res.json();

        if (data.ok) {
          localStorage.setItem('pa_user', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          showError(data.error || '操作失败');
          btn.disabled = false;
          btn.textContent = mode === 'login' ? '登录' : '注册';
        }
      } catch (err) {
        // 后端不可用时，使用本地模式
        if (mode === 'register') {
          const users = JSON.parse(localStorage.getItem('pa_users') || '{}');
          if (users[username]) { showError('用户名已存在'); btn.disabled=false; btn.textContent='注册'; return false; }
          users[username] = { password, email, createdAt: Date.now() };
          localStorage.setItem('pa_users', JSON.stringify(users));
        } else {
          const users = JSON.parse(localStorage.getItem('pa_users') || '{}');
          if (!users[username] || users[username].password !== password) {
            // 如果用户不存在，自动创建（方便快速体验）
            if (!users[username]) {
              users[username] = { password, createdAt: Date.now() };
              localStorage.setItem('pa_users', JSON.stringify(users));
            } else {
              showError('用户名或密码错误');
              btn.disabled = false;
              btn.textContent = '登录';
              return false;
            }
          }
        }
        const user = { username, email: email || '', loginAt: Date.now() };
        localStorage.setItem('pa_user', JSON.stringify(user));
        window.location.href = 'index.html';
      }
      return false;
    }

    function guestLogin() {
      const user = { username: '游客', guest: true, loginAt: Date.now() };
      localStorage.setItem('pa_user', JSON.stringify(user));
      window.location.href = 'index.html';
    }

    // ---- 自定义背景图管理 ----
    const BG_STORAGE_KEY = 'pa_login_bg';

    // 页面加载时恢复已保存的背景
    (function loadBg() {
      const saved = localStorage.getItem(BG_STORAGE_KEY);
      if (saved) {
        document.body.style.backgroundImage =
          'linear-gradient(rgba(13,14,26,0.55), rgba(13,14,26,0.55)), url(' + saved + ')';
        document.getElementById('bgResetBtn').classList.add('show');
      }
    })();

    // 选择本地图片并设为背景
    function handleBgChange(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const dataUrl = ev.target.result;
        localStorage.setItem(BG_STORAGE_KEY, dataUrl);
        document.body.style.backgroundImage =
          'linear-gradient(rgba(13,14,26,0.55), rgba(13,14,26,0.55)), url(' + dataUrl + ')';
        document.getElementById('bgResetBtn').classList.add('show');
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    }

    // 恢复默认背景（清除本地自定义）
    function resetBg() {
      localStorage.removeItem(BG_STORAGE_KEY);
      document.body.style.backgroundImage = '';
      document.getElementById('bgResetBtn').classList.remove('show');
    }
  </script>
</body>
</html>
